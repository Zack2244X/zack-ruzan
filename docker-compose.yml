# Docker Compose — Development
version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=development
      - PORT=3000
    volumes:
      - ./server:/app/server
      - ./client:/app/client
    restart: unless-stopped
