# ============================================
#   CI/CD Pipeline — منصة الاختبارات التفاعلية
# ============================================
name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: ./server
        run: npm ci

      - name: Build Tailwind CSS
        run: npm run build:css

      - name: Check for security vulnerabilities
        working-directory: ./server
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Verify server starts
        working-directory: ./server
        run: node -e "try { require('./index.js'); console.log('✅ Server module loads OK'); } catch(e) { if (!e.message.includes('ECONNREFUSED') && !e.message.includes('connect')) { throw e; } console.log('✅ Module structure OK (DB not available in CI)'); }"
        env:
          DB_HOST: localhost
          DB_NAME: test
          DB_USER: test
          DB_PASS: test
          GOOGLE_CLIENT_ID: test
          JWT_SECRET: ci-test-secret-key-12345
          NODE_ENV: development

      - name: Run unit tests
        working-directory: ./server
        run: npm test
        env:
          DB_HOST: localhost
          DB_NAME: test
          DB_USER: test
          DB_PASS: test
          GOOGLE_CLIENT_ID: test
          JWT_SECRET: ci-test-secret-key-12345
          ADMIN_EMAILS: admin@test.com
          NODE_ENV: test

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t quiz-platform:${{ github.sha }} .

      - name: Verify Docker image
        run: docker images quiz-platform:${{ github.sha }}
